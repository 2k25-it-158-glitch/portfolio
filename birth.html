        body {

            color: white; 
        }

h1:hover{

            margin-top: 15px;
            object-fit: cover;         
            transition: transform 0.3s ease;  
        }
.babar-pic:hover {
    transform: scale(1.1); /* 1.1 ka matlab hai 10% badi ho jana */
cursor: pointer;
    border-color: limegreen; /* Border ka rang bhi darkgreen se badal kar bright ho jayega! */
}
        p {
            background-color: white;
            max-width: 500px;         
            margin: 25px auto;

            line-height: 1.5;         
        }

            text-shadow: 1px 1px 3px black; /* ✨ Yeh bhi chalega! */
        }
        li {
    transition: all 0.3s ease; /* Smooth badlaav ke liye */
}

li:hover {
    color: darkgreen; /* Mouse le jaane par text ka rang green ho jayega */

    font-weight: bold; /* Lafz thode mote ho jayen ge */
}
/* 1. Button ka asli roop */
.vip-btn {
    background-color: darkgreen; /* Button ka rang */
    color: white; /* Lafz ka rang */
    font-size: 18px; /* Lafz thode bade */
    padding: 12px 24px; /* Button ke andar ki jagah (motapa) */
    border: none; /* Boring purani kali line khatam */
    border-radius: 25px; /* Button ke koney ekdum gol capsule jaise */
    cursor: pointer; /* Jab mouse jaye toh hath ka nishan bane */
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3); /* Button ke piche kaala saaya */
    margin-top: 20px; /* List se thoda neeche khiske */
    transition: all 0.3s ease; /* Hover jadoo smooth karne ke liye */
}

/* 2. Button par Hover ka jadoo */
.vip-btn:hover {
    background-color: limegreen; /* Mouse le jaane par chamakdar green */
    transform: scale(1.05); /* Thoda sa bada hoga */
    box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.4); /* Saaya aur gehra ho jayega */
}
.button-box {
    display: flex;          /* ⚡ Yeh line sab kuch ek line mein le aayegi! */
    justify-content: center; /* 🎯 Buttons ko screen ke center (beech) mein layega */
    gap: 20px;              /* ↔️ Dono buttons ke beech 20px ka khoobsurat gap banayega */
    margin-top: 30px;       /* ⬆️ List se buttons ko thoda neeche khiskayega */
}
    </style>
</head>
<body>
